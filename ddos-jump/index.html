<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Jump (Canvas)</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrap">
      <canvas id="game" width="420" height="640" aria-label="Doodle Jump game canvas"></canvas>
      <div id="overlay" class="overlay" role="status" aria-live="polite">
        <div class="title">DOODLE JUMP</div>
        <div class="sub">
          Phone movement: tilt left/right<br />
          Touch shoot: tap a point above the hero (desktop: <kbd>Space</kbd>)<br />
          Jump on platforms by falling onto them.
        </div>
        <button id="btnStart" class="btn">Start</button>
        <div id="msg" class="msg"></div>
      </div>
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>Best: <span id="best">0</span></div>
        <div>Kills: <span id="kills">0</span></div>
      </div>
    </div>
    <script src="./game.js"></script>
  </body>
</html>
